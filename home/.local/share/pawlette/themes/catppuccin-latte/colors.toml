# Catppuccin Latte — https://github.com/catppuccin/catppuccin
# Base palette uses Lavender accent; override via --variant

[colors]
# --- Surfaces ---
color_bg              = "#eff1f5"  # Base
color_bg_alt          = "#e6e9ef"  # Mantle
color_surface         = "#ccd0da"  # Surface 0
color_surface_alt     = "#bcc0cc"  # Surface 1

# --- Text ---
color_text            = "#4c4f69"  # Text
color_text_muted      = "#5c5f77"  # Subtext 1
color_text_subtle     = "#6c6f85"  # Subtext 0

# --- Accents ---
color_primary         = "#7287fd"  # Lavender
color_secondary       = "#8839ef"  # Mauve

# --- Borders ---
color_border_active   = "#7287fd"  # Lavender
color_border_inactive = "#bcc0cc"  # Surface 1

# --- Cursor / Selection ---
color_cursor          = "#7287fd"  # Lavender
color_selection_bg    = "#acb0be"  # Selection (surface 2)

# --- ANSI 16 ---
ansi_color0           = "#eff1f5"  # Base         (black)
ansi_color1           = "#d20f39"  # Red
ansi_color2           = "#40a02b"  # Green
ansi_color3           = "#df8e1d"  # Yellow
ansi_color4           = "#1e66f5"  # Blue
ansi_color5           = "#8839ef"  # Mauve        (magenta)
ansi_color6           = "#179299"  # Teal         (cyan)
ansi_color7           = "#5c5f77"  # Subtext 1    (white)
ansi_color8           = "#acb0be"  # Surface 2    (bright black)
ansi_color9           = "#d20f39"  # Red   (bright)
ansi_color10          = "#40a02b"  # Green (bright)
ansi_color11          = "#df8e1d"  # Yellow (bright)
ansi_color12          = "#7287fd"  # Lavender     (bright blue)
ansi_color13          = "#ea76cb"  # Pink         (bright magenta)
ansi_color14          = "#04a5e5"  # Sky          (bright cyan)
ansi_color15          = "#4c4f69"  # Text         (bright white)

# --- Semantic ---
color_red             = "#d20f39"  # Red
color_green           = "#40a02b"  # Green
color_yellow          = "#df8e1d"  # Yellow
color_blue            = "#1e66f5"  # Blue
color_cyan            = "#179299"  # Teal
color_magenta         = "#8839ef"  # Mauve

# ---------------------------------------------------------------------------
# Variants — override accent colours
# ---------------------------------------------------------------------------

[variants.rosewater]
color_primary         = "#dc8a78" # Rosewater
color_secondary       = "#dd7878" # Flamingo
color_border_active   = "#dc8a78"
color_cursor          = "#dc8a78"

